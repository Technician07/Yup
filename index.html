<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant | Mrtechnician Edition</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root {
            --bg: #1a1a1a;
            --panel: #2d2d2d;
            --text: #ffffff;
            --accent: #0078d4;
            --ai-bubble: #3d3d3d;
            --user-bubble: #005a9e;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #chat-window {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 15px;
        }

        .user {
            align-self: flex-end;
            background-color: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }

        .ai {
            align-self: flex-start;
            background-color: var(--ai-bubble);
            border-bottom-left-radius: 4px;
            white-space: pre-wrap; /* Preserves formatting from AI */
        }

        #input-container {
            background-color: var(--panel);
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #444;
        }

        input {
            flex-grow: 1;
            background: #111;
            border: 1px solid #555;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { background-color: #0086ed; }

        .typing { 
            color: var(--accent); 
            font-size: 0.9rem; 
            padding: 10px 20px;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="chat-window">
        <div class="bubble ai">Hello! I am your AI Assistant powered by Puter. How can I help you today?</div>
    </div>

    <div id="status-area"></div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>


  <script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const statusArea = document.getElementById('status-area');

    // This is the instruction set for the AI's personality
    const SYSTEM_INSTRUCTIONS = `
        You are a professional Assistant and a specialist in cybersecurity and ethical hacking. 
        Your purpose is to guide the user professionally on security matters, 
        helping them understand how to protect accounts and deal with digital threats 
        like blackmailers or corrupt entities ethically. 
        You act as a brilliant cyber specialist and the best ethical hacker on the planet.
    `;

    function addBubble(text, type) {
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function processAI() {
        const prompt = userInput.value.trim();
        if (!prompt) return;

        addBubble(prompt, 'user');
        userInput.value = '';
        
        statusArea.innerHTML = '<div class="typing">Assistant is analyzing...</div>';

        try {
            // ---------------------------------------------------------
            // THE BRAIN: Puter AI with System Persona
            // ---------------------------------------------------------
            const response = await puter.ai.chat(
                prompt, 
                { system_prompt: SYSTEM_INSTRUCTIONS }
            );
            
            const responseText = response.toString();
            addBubble(responseText, 'ai');

        } catch (error) {
            console.error(error);
                 // 3. Add AI's message to UI
            addBubble(responseText, 'ai');
        } catch (error) {
            console.error(error);
            addBubble("Error: Could not connect to the AI brain. Make sure you are logged into Puter.", "ai");
        } finally {
            statusArea.innerHTML = '';
        }
    }

    // Event Listeners
    sendBtn.addEventListener('click', processAI);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') processAI();
    });
</script>
</body>
</html>
