<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrtechnician | Cyber Specialist AI</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #161616;
            --text: #00ff41; /* Matrix/Hacker Green */
            --accent: #0078d4;
            --ai-bubble: #1f1f1f;
            --user-bubble: #003366;
            --border: #333;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #chat-window {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-bottom: 1px solid var(--border);
        }

        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 10px;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 14px;
            border: 1px solid #444;
        }

        .user {
            align-self: flex-end;
            background-color: var(--user-bubble);
            color: white;
        }

        .ai {
            align-self: flex-start;
            background-color: var(--ai-bubble);
            color: var(--text);
            white-space: pre-wrap;
        }

        /* Fixed Input Area */
        #input-container {
            background-color: var(--panel);
            padding: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #user-input {
            flex-grow: 1;
            background: #000;
            border: 1px solid var(--text);
            color: var(--text);
            padding: 15px;
            border-radius: 5px;
            outline: none;
            font-family: inherit;
        }

        #send-btn {
            background-color: var(--text);
            color: #000;
            border: none;
            padding: 15px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        #send-btn:hover {
            background-color: #008f11;
        }

        .status {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 5px;
            padding-left: 20px;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="chat-window">
        <div class="bubble ai">SYSTEM INITIALIZED: Ethical Hacking Specialist Online. How can I assist with your security objectives?</div>
    </div>

    <div id="status-area" class="status"></div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Enter command or query..." autocomplete="off">
        <button id="send-btn">SEND</button>
    </div>
</div>

<script>
    // Elements
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const statusArea = document.getElementById('status-area');

    // THE BRAIN INSTRUCTIONS
    const SYSTEM_PROMPT = `You are a professional Assistant, a Specialist ethical Hacker, and a Cyber specialist. 
    You are the best ethical hacker on the planet. Your purpose is to guide the user professionally in 
    ethical hacking and security. You help users deal with blackmailers and corrupt people 
    by providing brilliant technical guidance and computer security expertise.`;

    function addBubble(text, type) {
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function processAI() {
        const query = userInput.value.trim();
        if (!query) return;

        // Display User Input
        addBubble(query, 'user');
        userInput.value = '';
        
        statusArea.innerText = "EXPLOITING DATA... (Thinking)";

        try {
            // CALLING THE PUTER BRAIN
            const response = await puter.ai.chat(query, {
                system_prompt: SYSTEM_PROMPT
            });
            
            addBubble(response.toString(), 'ai');
        } catch (error) {
            console.error(error);
            addBubble("CONNECTION ERROR: Verify Puter.com login status.", "ai");
        } finally {
            statusArea.innerText = "";
        }
    }

    // Logic to trigger the Send
    sendBtn.onclick = processAI;

    userInput.onkeypress = function(e) {
        if (e.key === 'Enter') processAI();
    };
</script>

</body>
</html>
